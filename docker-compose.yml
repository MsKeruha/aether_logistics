version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./aether.db
      - SECRET_KEY=aether_super_secret_key_1234567890
    networks:
      - aether_network

  frontend:
    build: 
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - aether_network

networks:
  aether_network:
    driver: bridge

volumes:
  backend_data:
